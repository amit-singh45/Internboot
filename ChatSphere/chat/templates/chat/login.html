{% extends 'chat/base.html' %}

{% block title %}Login - ChatSphere{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center auth-container">
    <div class="col-md-5">
        <div class="glass-card fade-in">
            <div class="card-body p-5 text-center">
                <h2 class="mb-4 fw-bold gradient-text">Welcome Back</h2>
                <p class="text-muted mb-4">Login to continue to ChatSphere</p>

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-4 text-start form-floating">
                        <input type="text" name="username" class="form-control glass-input" id="username"
                            placeholder="Username" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="mb-4 text-start form-floating">
                        <input type="password" name="password" class="form-control glass-input" id="password"
                            placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>
                    {% if login_form.errors %}
                    <div class="text-danger mb-3 small">Invalid credentials</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary-gradient w-100 py-3 fw-bold ripple-btn">Log In</button>
                </form>

                <div class="mt-4">
                    <p class="text-muted">Don't have an account? <a href="{% url 'register' %}"
                            class="text-cyan text-decoration-none">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

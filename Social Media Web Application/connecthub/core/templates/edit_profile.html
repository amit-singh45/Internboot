{% extends 'base.html' %}
{% block content %}
<div class="row">
  <div class="col-md-6 mx-auto">
    <div class="card p-4">
      <h4 class="mb-4">Edit Profile</h4>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100 mt-3">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
